<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="auth-container">
        <h3>Login</h3>
        <div id="login-forms">
          <div id="student-login">
            <h4>Student Login</h4>
            <form id="student-login-form">
              <div class="form-group">
                <label for="student-email">Email:</label>
                <input type="email" id="student-email" required placeholder="your-email@mergington.edu" />
              </div>
              <button type="submit">Login as Student</button>
            </form>
          </div>
          <div id="teacher-login">
            <h4>Teacher Login</h4>
            <form id="teacher-login-form">
              <div class="form-group">
                <label for="teacher-username">Username:</label>
                <input type="text" id="teacher-username" required />
              </div>
              <div class="form-group">
                <label for="teacher-password">Password:</label>
                <input type="password" id="teacher-password" required />
              </div>
              <button type="submit">Login as Teacher</button>
            </form>
          </div>
        </div>
        <div id="auth-status" class="hidden">
          <p>Logged in as: <span id="user-info"></span></p>
          <button id="logout-btn">Logout</button>
        </div>
        <div id="auth-message" class="hidden"></div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container" class="hidden">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
